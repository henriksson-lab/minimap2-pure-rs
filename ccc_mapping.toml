# Mapping file for code-complexity-comparator (`ccc-rs`).
#
# Pins Rust functions to their C minimap2 counterparts so ccc's auto-matcher
# (FFI attribute / exact name / normalized name / fingerprint) does not make
# wrong pairings. ccc-rs picks this file up automatically when it exists in
# the working directory.
#
# Usage:
#   ccc-rs analyze minimap2 -l c    --recurse -o c.json
#   ccc-rs analyze src      -l rust --recurse -o rust.json
#   ccc-rs compare rust.json c.json --top 50
#   ccc-rs constants-diff rust.json c.json
#
# Entry shape (see ccc-rs/src/compare/matching.rs):
#   [[entries]]
#   rust = "rust_name"           # function name in the Rust report
#   other = "c_name"             # function name in the C report
#   rust_path = "suffix/of/file" # optional Rust file path suffix
#   other_path = "suffix/of/file.c" # optional C file path suffix
#
# Groups below follow C file order in minimap2/.

