# Mapping file for code-complexity-comparator (`ccc-rs`).
#
# Pins Rust functions to their C minimap2 counterparts when the names differ
# enough that ccc's automatic matchers (FFI attribute / exact name /
# normalized name / fingerprint) miss them. ccc-rs picks this file up by
# default if it exists in the working directory.
#
# Use:
#   ccc-rs analyze minimap2     -l c    --recurse -o c.json
#   ccc-rs analyze src          -l rust --recurse -o rust.json
#   ccc-rs compare rust.json c.json --top 25
#
# Each entry shape (see ccc-rs/src/compare/matching.rs):
#   [[entries]]
#   rust = "rust_name"           # function name in the Rust report
#   other = "c_name"             # function name in the C report
#   rust_path = "..."            # optional: Rust file path suffix to disambiguate
#   other_path = "..."           # optional: C file path suffix
#
# Pin both sides whenever a function name appears in multiple files.

# ---- index construction & I/O ----
