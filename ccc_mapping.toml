# ---- threading / pipeline driver ----
# Rust uses crossbeam channels + thread::scope + rayon; C uses pthread-based
# kt_pipeline / kt_for. These are structurally different and not 1:1 — left
# unmapped so ccc reports them as architecture differences rather than
# unmatched functions.
