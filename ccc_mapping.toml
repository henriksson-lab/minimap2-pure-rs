# =========================================================================
# Threading note
# =========================================================================
# C uses pthread-based kt_for / kt_pipeline with ktf_worker / ktp_worker
# inner functions. The Rust port replaces these with rayon's global pool,
# crossbeam channels, and thread::scope in src/index/mod.rs and
# src/pipeline.rs. These are architecturally different — ccc should
# report kt_for / kt_pipeline / steal_work / worker_for as unmatched
# rather than auto-matching them to unrelated Rust functions.
